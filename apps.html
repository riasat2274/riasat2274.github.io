<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Published Games</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
}

h1 {
    font-size: 2.5rem;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card img {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    object-fit: cover;
    margin-bottom: 15px;
}

.card h3 {
    font-size: 1.1rem;
    margin: 10px 0;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    background: #22c55e;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}
</style>
</head>
<body>

<header>
    <h1>My Published Games</h1>
    <p>Available on Google Play</p>
</header>

<div class="grid" id="appGrid"></div>

<script>
const apps = [
{
title: "Hole Jam",
icon: "images/apps/holejam.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.holejam"
},
{
title: "Goods Tap Jam",
icon: "images/apps/goodstapjam.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.goodstapjam"
},
{
title: "Color Slide Jam",
icon: "images/apps/colorslidejam.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.colorslidejam"
},
{
title: "Restaurant Jam",
icon: "images/apps/restaurantjam.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.restaurantjam"
},
{
title: "Red Rail Redemption",
icon: "images/apps/redrailredemption.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.redrailredemption"
},
{
title: "chain Squad",
icon: "images/apps/chainsquad.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.chainsquad"
},
{
title: "Armoured Assembly",
icon: "images/apps/armoredassembly.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.armoredassembly"
},
{
title: "Action Tower",
icon: "images/apps/actiontower.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.actiontower"
},
{
title: "Chaos Soldier",
icon: "images/apps/chaossoldier.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.chaossoldier"
},
{
title: "Luggage Unblock Frenzy",
icon: "images/apps/luggageunblockfrenzy.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.luggageunblockfrenzy"
},
{
title: "Jelly Build Jam",
icon: "images/apps/jellybuildjam.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.jellybuildjam"
},
{
title: "Tray Slide Merge",
icon: "images/apps/trayslidemerge.png",
link: "https://play.google.com/store/apps/details?id=com.kolpoverse.trayslidemerge"
}
];

const grid = document.getElementById("appGrid");

apps.forEach(app => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <img src="${app.icon}" alt="${app.title}">
        <h3>${app.title}</h3>
        <a href="${app.link}" target="_blank">View on Play Store</a>
    `;
    grid.appendChild(card);
});
</script>

</body>
</html>
