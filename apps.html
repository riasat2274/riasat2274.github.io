<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Published Games</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
}

h1 {
    font-size: 2.5rem;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card img {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    object-fit: cover;
    margin-bottom: 15px;
}

.card h3 {
    font-size: 1.1rem;
    margin: 10px 0;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    background: #22c55e;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}
</style>
</head>
<body>

<header>
    <h1>My Published Games</h1>
    <p>Available on Google Play</p>
</header>

<div class="grid" id="appGrid"></div>

<script>
const appLinks = [
"https://play.google.com/store/apps/details?id=com.kolpoverse.holejam",
"https://play.google.com/store/apps/details?id=com.kolpoverse.goodstapjam",
"https://play.google.com/store/apps/details?id=com.kolpoverse.colorslidejam",
"https://play.google.com/store/apps/details?id=com.kolpoverse.restaurantjam",
"https://play.google.com/store/apps/details?id=com.kolpoverse.redrailredemption",
"https://play.google.com/store/apps/details?id=com.kolpoverse.chainsquad",
"https://play.google.com/store/apps/details?id=com.kolpoverse.armoredassembly",
"https://play.google.com/store/apps/details?id=com.kolpoverse.actiontower",
"https://play.google.com/store/apps/details?id=com.kolpoverse.chaossoldier",
"https://play.google.com/store/apps/details?id=com.kolpoverse.luggageunblockfrenzy",
"https://play.google.com/store/apps/details?id=com.kolpoverse.jellybuildjam",
"https://play.google.com/store/apps/details?id=com.kolpoverse.trayslidemerge",
"https://play.google.com/store/apps/details?id=com.alphapotato.prankster",
"https://play.google.com/store/apps/details?id=com.alphapotato.pawnshopmaster"
];

const grid = document.getElementById("appGrid");

async function fetchAppData(url) {
    try {
        const proxy = "https://api.allorigins.win/get?url=";
        const response = await fetch(proxy + encodeURIComponent(url));
        const data = await response.json();
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.contents, "text/html");

        const title = doc.querySelector('meta[property="og:title"]')?.content || "App";
        const image = doc.querySelector('meta[property="og:image"]')?.content || "";

        return { title, image, url };
    } catch (err) {
        return { title: "Unavailable", image: "", url };
    }
}

async function loadApps() {
    for (let link of appLinks) {
        const app = await fetchAppData(link);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${app.image}" alt="${app.title}">
            <h3>${app.title}</h3>
            <a href="${app.url}" target="_blank">View on Play Store</a>
        `;

        grid.appendChild(card);
    }
}

loadApps();
</script>

</body>
</html>
